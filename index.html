<!DOCTYPE html>
<html lang="en"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS/NZS 3000 Conduit Visualiser</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --primary: #2563eb; --danger: #dc2626; --success: #16a34a;
            --bg: #f1f5f9; --card-bg: #ffffff; --text: #1e293b; --border: #cbd5e1;
        }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; max-width: 1300px; width: 100%; }
        .controls { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); flex: 1; min-width: 380px; max-width: 500px; }
        .category-group { background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 15px; }
        h3 { margin-top: 0; font-size: 1rem; color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        label { display: block; margin: 10px 0 5px; font-weight: 700; font-size: 0.8rem; }
        select, input { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 4px; box-sizing: border-box; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
        .btn { padding: 8px; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        .btn-add { background: var(--primary); color: white; }
        .btn-fill { background: #0f172a; color: white; }
        .btn-pdf { background: #059669; color: white; width: 100%; margin-top: 10px; font-size: 1rem; }
        .btn-reset { background: #64748b; color: white; width: 100%; margin-top: 15px; }
        .stats-panel { border-top: 2px solid var(--border); margin-top: 20px; padding-top: 15px; }
        .stat-row { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        .fill-bar-bg { height: 24px; background: #e2e8f0; border-radius: 12px; overflow: hidden; position: relative; margin: 10px 0; border: 1px solid #94a3b8; }
        .fill-bar-inner { height: 100%; width: 0%; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .limit-line { position: absolute; top: 0; bottom: 0; width: 3px; background: #000; z-index: 5; }
        .inventory { margin-top: 15px; max-height: 250px; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; background: white; }
        .inv-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; border-bottom: 1px solid #f1f5f9; font-size: 0.8rem; }
        .btn-remove { background: #fee2e2; color: var(--danger); border: 1px solid #fecaca; padding: 2px 6px; border-radius: 3px; cursor: pointer; }
        .canvas-area { background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; position: sticky; top: 20px; height: fit-content; }
        .warning-msg { color: var(--danger); background: #fef2f2; padding: 10px; border-radius: 6px; font-size: 0.85rem; margin-top: 10px; display: none; font-weight: bold; border: 1px solid #fee2e2; }
    </style>
</head>
<body>

    <h1 style="margin-bottom:25px;">AS/NZS 3000 Conduit Visualiser</h1>

    <div class="container">
        <div class="controls">
            <div class="category-group" style="background: #fff;">
                <label>Standard Conduit Type (Orange HD)</label>
                <select id="conType" onchange="updateFromDropdown()">
                    <option value="20,16.4">20mm (20mm OD, 16.4mm ID)</option>
                    <option value="25,21.0">25mm (25mm OD, 21.0mm ID)</option>
                    <option value="32,27.8">32mm (32mm OD, 27.8mm ID)</option>
                    <option value="40,35.0">40mm (40mm OD, 35.0mm ID)</option>
                    <option value="50,44.2">50mm (50mm OD, 44.2mm ID)</option>
                    <option value="63,56.0" selected>63mm (63mm OD, 56.0mm ID)</option>
                    <option value="88.9,80.0">80mm (88.9mm OD, 80.0mm ID)</option>
                    <option value="114.3,100.0">100mm (114.3mm OD, 100.0mm ID)</option>
                    <option value="140.2,125.0">125mm (140.2mm OD, 125.0mm ID)</option>
                    <option value="160.0,150.0">150mm (160.0mm OD, 150.0mm ID)</option>
                </select>
            </div>

            <div class="category-group">
                <h3>Power</h3>
                <select id="pwrSel">
                    <optgroup label="TriCab Aluminium XL Flexible (2C+E)">
                        <option value="10.8">1.5mm² Al XL Rubber (10.8mm OD)</option>
                        <option value="11.6">2.5mm² Al XL Rubber (11.6mm OD)</option>
                        <option value="13.1">4.0mm² Al XL Rubber (13.1mm OD)</option>
                        <option value="14.2">6.0mm² Al XL Rubber (14.2mm OD)</option>
                        <option value="18.8">10.0mm² Al XL Rubber (18.8mm OD)</option>
                        <option value="20.8">16.0mm² Al XL Rubber (20.8mm OD)</option>
                        <option value="23.2">25.0mm² Al XL Rubber (23.2mm OD)</option>
                        <option value="26.1">35.0mm² Al XL Rubber (26.1mm OD)</option>
                        <option value="28.9">50.0mm² Al XL Rubber (28.9mm OD)</option>
                    </optgroup>
                    <optgroup label="Copper SDI">
                        <option value="5.0">1.5mm² SDI (5.0mm OD)</option>
                        <option value="5.4">2.5mm² SDI (5.4mm OD)</option>
                        <option value="6.7">6.0mm² SDI (6.7mm OD)</option>
                        <option value="8.0">10mm² SDI (8.0mm OD)</option>
                        <option value="8.9">16mm² SDI (8.9mm OD)</option>
                        <option value="10.8">25mm² SDI (10.8mm OD)</option>
                        <option value="12.0">35mm² SDI (12.0mm OD)</option>
                        <option value="13.7">50mm² SDI (13.7mm OD)</option>
                        <option value="15.8">70mm² SDI (15.8mm OD)</option>
                        <option value="17.9">95mm² SDI (17.9mm OD)</option>
                    </optgroup>
                    <optgroup label="Copper Flat TPS (2C + E)">
                        <option value="9.9,4.5">1.5mm² Flat (9.9mm x 4.5mm)</option>
                        <option value="11.2,5.1">2.5mm² Flat (11.2mm x 5.1mm)</option>
                        <option value="12.7,5.8">4.0mm² Flat (12.7mm x 5.8mm)</option>
                        <option value="14.5,6.5">6.0mm² Flat (14.5mm x 6.5mm)</option>
                        <option value="18.3,8.2">10.0mm² Flat (18.3mm x 8.2mm)</option>
                        <option value="21.3,9.5">16.0mm² Flat (21.3mm x 9.5mm)</option>
                        <option value="25.5,11.5">25.0mm² Flat (25.5mm x 11.5mm)</option>
                        <option value="29.0,13.0">35.0mm² Flat (29.0mm x 13.0mm)</option>
                        <option value="33.0,14.5">50.0mm² Flat (33.0mm x 14.5mm)</option>
                    </optgroup>
                    <optgroup label="Copper Orange Circular (2C + E)">
                        <option value="11.6">2.5mm² OC (11.6mm OD)</option>
                        <option value="14.8">6.0mm² OC (14.8mm OD)</option>
                        <option value="17.5">10.0mm² OC (17.5mm OD)</option>
                        <option value="19.2">16.0mm² OC (19.2mm OD)</option>
                        <option value="23.3">25.0mm² OC (23.3mm OD)</option>
                        <option value="26.4">35.0mm² OC (26.4mm OD)</option>
                        <option value="29.9">50.0mm² OC (29.9mm OD)</option>
                        <option value="34.3">70.0mm² OC (34.3mm OD)</option>
                        <option value="39.5">95.0mm² OC (39.5mm OD)</option>
                    </optgroup>
                </select>
                <div class="btn-grid">
                    <button class="btn btn-add" onclick="handleAdd('pwrSel', 'power')">Add One</button>
                    <button class="btn btn-fill" onclick="handleBulk('pwrSel', 'power')">Fill to Max</button>
                </div>
            </div>

            <div class="category-group">
                <h3>Fibre</h3>
                <select id="fbrSel">
                    <optgroup label="MILSPEC">
                        <option value="5.5">2-Core MILSPEC (5.5mm OD)</option>
                        <option value="6.5">4-Core MILSPEC (6.5mm OD)</option>
                    </optgroup>
                    <optgroup label="Single Mode">
                        <option value="9.5">12-Core SM (9.5mm OD)</option>
                        <option value="12.5">24-Core SM (12.5mm OD)</option>
                        <option value="15.5">48-Core SM (15.5mm OD)</option>
                        <option value="18.0">72-Core SM (18.0mm OD)</option>
                        <option value="22.5">144-Core SM (22.5mm OD)</option>
                        <option value="24.8">216-Core SM (24.8mm OD)</option>
                    </optgroup>
                </select>
                <div class="btn-grid">
                    <button class="btn btn-add" style="background:#0284c7" onclick="handleAdd('fbrSel', 'fibre')">Add One</button>
                    <button class="btn btn-fill" onclick="handleBulk('fbrSel', 'fibre')">Fill to Max</button>
                </div>
            </div>

            <div class="category-group">
                <h3>Traffic Signals</h3>
                <select id="trfSel">
                    <optgroup label="Loop Feeder">
                        <option value="8.1">Loop Feeder (8.1mm OD)</option>
                    </optgroup>
                    <optgroup label="Traffic Signals Multicore">
                        <option value="11.5">6-Core Traffic (11.5mm OD)</option>
                        <option value="19.2">19-Core Traffic (19.2mm OD)</option>
                        <option value="24.5">29-Core Traffic (24.5mm OD)</option>
                        <option value="27.8">36-Core Traffic (27.8mm OD)</option>
                        <option value="32.0">51-Core Traffic (32.0mm OD)</option>
                    </optgroup>
                </select>
                <div class="btn-grid">
                    <button class="btn btn-add" style="background:#ea580c" onclick="handleAdd('trfSel', 'traffic')">Add One</button>
                    <button class="btn btn-fill" onclick="handleBulk('trfSel', 'traffic')">Fill to Max</button>
                </div>
            </div>

            <div class="stats-panel">
                <div class="stat-row">
                    <span>Cable Count: <span id="cableCount">0</span></span>
                    <span>Fill: <span id="fillPct">0.0%</span></span>
                </div>
                <div class="stat-row" style="color:#64748b; font-size:0.8rem;">
                    <span>Current Max Allowed:</span>
                    <span><span id="maxAllowed">40%</span></span>
                </div>
                <div class="fill-bar-bg">
                    <div id="barLimit" class="limit-line" style="left: 40%;"></div>
                    <div id="barInner" class="fill-bar-inner"></div>
                </div>
                <div id="warn" class="warning-msg"></div>
                <label>Inventory &amp; OD Log</label>
                <div class="inventory" id="invList"></div>
                <button class="btn btn-reset" onclick="reset()">Reset All Data</button>
            </div>
        </div>

        <div class="canvas-area">
            <canvas id="c" width="500" height="500"></canvas>
            <div id="conduitLabel" style="margin-top: 10px; font-weight: bold; font-size: 1.1rem; color: #000000;">63mm</div>
            <div style="margin-top:15px; font-size:0.85rem; display:flex; gap:20px; justify-content:center; font-weight:600;">
                <span><span style="color:#ef4444">■</span> Power</span>
                <span><span style="color:#0284c7">■</span> Fibre</span>
                <span><span style="color:#ea580c">■</span> Traffic</span>
            </div>
            <div style="margin-top:20px; text-align:left;">
                <label>Project Identifier</label>
                <input type="text" id="projId" placeholder="e.g. Site A - Conduit 01">
                <button class="btn btn-pdf" onclick="exportToPDF()">Export to PDF</button>
            </div>
        </div>
    </div>

    <script>
        let conduitD = 56.0;
        let outerD = 63.0;
        let cables = [];
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const colors = { power: '#ef4444', fibre: '#0284c7', traffic: '#ea580c' };

        function updateFromDropdown() {
            const sel = document.getElementById('conType');
            const val = sel.value.split(',');
            outerD = parseFloat(val[0]);
            conduitD = parseFloat(val[1]);
            repack();
            update();
        }

        function handleAdd(id, type) {
            const sel = document.getElementById(id);
            const val = sel.value.split(',');
            const label = sel.options[sel.selectedIndex].text;
            const sub = sel.options[sel.selectedIndex].parentNode.label || 'Standard';
            
            let cableObj = { id: Math.random(), type, label, sub, angle: 0 };
            if (sub === "Copper Flat TPS (2C + E)") {
                cableObj.isFlat = true;
                cableObj.w = parseFloat(val[0]);
                cableObj.h = parseFloat(val[1]);
                cableObj.area = cableObj.w * cableObj.h;
            } else {
                cableObj.isFlat = false;
                cableObj.d = parseFloat(val[0]);
                cableObj.r = cableObj.d / 2;
                cableObj.area = Math.PI * (cableObj.r**2);
            }

            if (addCableLogic(cableObj)) update();
        }

        function handleBulk(id, type) {
            const sel = document.getElementById(id);
            const val = sel.value.split(',');
            const label = sel.options[sel.selectedIndex].text;
            const sub = sel.options[sel.selectedIndex].parentNode.label || 'Standard';
            
            let addedCount = 0;
            while (true) {
                let cableObj = { id: Math.random(), type, label, sub, angle: 0 };
                if (sub === "Copper Flat TPS (2C + E)") {
                    cableObj.isFlat = true;
                    cableObj.w = parseFloat(val[0]);
                    cableObj.h = parseFloat(val[1]);
                    cableObj.area = cableObj.w * cableObj.h;
                } else {
                    cableObj.isFlat = false;
                    cableObj.d = parseFloat(val[0]);
                    cableObj.r = cableObj.d / 2;
                    cableObj.area = Math.PI * (cableObj.r**2);
                }

                const currentAreaSum = cables.reduce((acc, c) => acc + c.area, 0);
                const totalInternalArea = Math.PI * (conduitD/2)**2;
                const nextFill = ((currentAreaSum + cableObj.area) / totalInternalArea) * 100;
                
                const limit = (cables.length + 1) >= 3 ? 40 : ((cables.length + 1) === 2 ? 33 : 50);
                if (nextFill > limit) break;
                if (!addCableLogic(cableObj)) break;
                addedCount++;
                if (addedCount > 400) break; 
            }
            update();
        }

        function addCableLogic(obj) {
            const res = findBestPos(obj);
            if (res) {
                obj.x = res.x; obj.y = res.y; obj.angle = res.angle;
                cables.push(obj);
                return true;
            }
            document.getElementById('warn').style.display = 'block';
            document.getElementById('warn').textContent = "Physical space exhausted!";
            return false;
        }

        function removeCable(id) { cables = cables.filter(c => c.id !== id); repack(); update(); }

        function repack() {
            const old = [...cables]; cables = [];
            old.sort((a,b) => (b.area || b.r**2) - (a.area || a.r**2)); 
            old.forEach(c => { 
                const res = findBestPos(c); 
                if(res) { 
                    c.x = res.x; c.y = res.y; c.angle = res.angle; 
                    cables.push(c); 
                }
            });
        }

        function findBestPos(obj) {
            const conduitR = conduitD / 2;
            const step = 0.5;
            // Generate 12 rotation angles (every 15 degrees)
            const anglesToTry = obj.isFlat ? Array.from({length: 12}, (_, i) => i * Math.PI / 12) : [0];

            for (let r = conduitR; r >= 0; r -= step) {
                for (let theta = 0; theta < Math.PI * 2; theta += (step / (r + 0.1))) {
                    const tx = r * Math.cos(theta);
                    const ty = r * Math.sin(theta);
                    
                    for (let angle of anglesToTry) {
                        if (checkCollision(tx, ty, angle, obj)) {
                            return { x: tx, y: ty, angle: angle };
                        }
                    }
                }
            }
            return null;
        }

        function getRectCorners(x, y, w, h, angle) {
            const cos = Math.cos(angle), sin = Math.sin(angle);
            return [ [-w/2, -h/2], [w/2, -h/2], [w/2, h/2], [-w/2, h/2] ].map(p => ({
                x: x + p[0]*cos - p[1]*sin,
                y: y + p[0]*sin + p[1]*cos
            }));
        }

        function rectRectOverlap(x1, y1, a1, w1, h1, x2, y2, a2, w2, h2) {
            const c1 = getRectCorners(x1, y1, w1, h1, a1);
            const c2 = getRectCorners(x2, y2, w2, h2, a2);
            const axes = [
                {x: c1[1].x - c1[0].x, y: c1[1].y - c1[0].y},
                {x: c1[2].x - c1[1].x, y: c1[2].y - c1[1].y},
                {x: c2[1].x - c2[0].x, y: c2[1].y - c2[0].y},
                {x: c2[2].x - c2[1].x, y: c2[2].y - c2[1].y}
            ];
            for (let axis of axes) {
                const len = Math.hypot(axis.x, axis.y);
                if (len === 0) continue;
                const nx = -axis.y / len, ny = axis.x / len;
                let min1 = Infinity, max1 = -Infinity, min2 = Infinity, max2 = -Infinity;
                for(let p of c1) { const dot = p.x*nx + p.y*ny; min1 = Math.min(min1, dot); max1 = Math.max(max1, dot); }
                for(let p of c2) { const dot = p.x*nx + p.y*ny; min2 = Math.min(min2, dot); max2 = Math.max(max2, dot); }
                if (max1 < min2 - 0.2 || max2 < min1 - 0.2) return false;
            }
            return true;
        }

        function rectCircleOverlap(rx, ry, ra, rw, rh, cx, cy, cr) {
            const dx = cx - rx;
            const dy = cy - ry;
            const localCX = dx * Math.cos(-ra) - dy * Math.sin(-ra);
            const localCY = dx * Math.sin(-ra) + dy * Math.cos(-ra);
            
            let closestX = Math.max(-rw/2, Math.min(localCX, rw/2));
            let closestY = Math.max(-rh/2, Math.min(localCY, rh/2));
            return Math.hypot(localCX - closestX, localCY - closestY) < cr + 0.2;
        }

        function checkCollision(x, y, angle, obj) {
            const conduitR = conduitD / 2;
            const margin = 0.1;

            if (obj.isFlat) {
                const cos = Math.cos(angle), sin = Math.sin(angle);
                const corners = [[-obj.w/2, -obj.h/2], [obj.w/2, -obj.h/2], [obj.w/2, obj.h/2], [-obj.w/2, obj.h/2]];
                for (let p of corners) {
                    const rx = p[0] * cos - p[1] * sin;
                    const ry = p[0] * sin + p[1] * cos;
                    if (Math.hypot(x + rx, y + ry) > conduitR - margin) return false;
                }
            } else {
                if (Math.hypot(x, y) + obj.r > conduitR - margin) return false;
            }

            for (let c of cables) {
                if (obj.isFlat && c.isFlat) {
                    if (rectRectOverlap(x, y, angle, obj.w, obj.h, c.x, c.y, c.angle, c.w, c.h)) return false;
                } else if (obj.isFlat || c.isFlat) {
                    if (obj.isFlat) {
                        if (rectCircleOverlap(x, y, angle, obj.w, obj.h, c.x, c.y, c.r)) return false;
                    } else {
                        if (rectCircleOverlap(c.x, c.y, c.angle, c.w, c.h, x, y, obj.r)) return false;
                    }
                } else {
                    if (Math.hypot(x - c.x, y - c.y) < (obj.r + c.r) + margin) return false;
                }
            }
            return true;
        }

        function update() {
            const count = cables.length;
            const cAreaSum = cables.reduce((acc, c) => acc + c.area, 0);
            const totalInternalArea = Math.PI * (conduitD/2)**2;
            const pct = (cAreaSum / totalInternalArea) * 100;
            const limit = count === 0 ? 50 : (count === 1 ? 50 : (count === 2 ? 33 : 40));
            
            document.getElementById('cableCount').textContent = count;
            document.getElementById('fillPct').textContent = pct.toFixed(1) + '%';
            document.getElementById('maxAllowed').textContent = limit + '%';
            document.getElementById('barLimit').style.left = limit + '%';
            const bar = document.getElementById('barInner');
            bar.style.width = Math.min(pct, 100) + '%';
            bar.style.background = pct > limit ? 'var(--danger)' : 'var(--success)';
            
            const warn = document.getElementById('warn');
            warn.style.display = pct > limit ? 'block' : 'none';
            if(pct > limit) warn.textContent = `AS/NZS 3000 VIOLATION: ${pct.toFixed(1)}% exceeds ${limit}% limit.`;

            const sel = document.getElementById('conType');
            const sizeOnly = sel.options[sel.selectedIndex].text.split(' (')[0];
            document.getElementById('conduitLabel').textContent = sizeOnly;

            document.getElementById('invList').innerHTML = cables.map(c => `
                <div class="inv-item">
                    <span>${c.label}</span>
                    <button class="btn-remove" onclick="removeCable(${c.id})">✕</button>
                </div>
            `).reverse().join('');
            draw();
        }

        function draw() {
            ctx.clearRect(0,0,500,500);
            const scale = 440 / outerD;
            ctx.beginPath();
            ctx.arc(250, 250, (outerD/2)*scale, 0, 7);
            ctx.fillStyle = '#cbd5e1'; ctx.fill();
            ctx.beginPath();
            ctx.arc(250, 250, (conduitD/2)*scale, 0, 7);
            ctx.fillStyle = '#e2e8f0'; ctx.fill();
            ctx.lineWidth = 2; ctx.strokeStyle = '#000000'; ctx.stroke();

            cables.forEach(c => {
                ctx.save();
                ctx.translate(250 + c.x * scale, 250 + c.y * scale);
                ctx.rotate(c.angle);
                ctx.fillStyle = colors[c.type];
                
                if (c.isFlat) {
                    ctx.beginPath();
                    const w = c.w * scale, h = c.h * scale, r = 2;
                    ctx.roundRect(-w/2, -h/2, w, h, r);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1; ctx.stroke();
                } else {
                    ctx.beginPath();
                    ctx.arc(0, 0, c.r*scale, 0, 7);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1; ctx.stroke();
                }
                ctx.restore();
            });
        }

        function reset() { cables = []; update(); }

        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const proj = document.getElementById('projId').value || "Unnamed Project";
            const count = cables.length, areaSum = cables.reduce((acc, c) => acc + c.area, 0);
            const totalInternalArea = Math.PI * (conduitD/2)**2;
            const pct = (areaSum / totalInternalArea) * 100;
            const limit = count <= 1 ? 50 : (count === 2 ? 33 : 40);
            const isCompliant = pct <= limit;

            doc.setFontSize(20); doc.text("Conduit Fill Report", 20, 20);
            doc.setFontSize(10); 
            doc.text(`Project: ${proj}`, 20, 30);
            doc.text(`Conduit: ${document.getElementById('conType').options[document.getElementById('conType').selectedIndex].text}`, 20, 35);
            doc.setFont(undefined, 'bold');
            doc.text(`Total Fill: ${pct.toFixed(1)}% / Status: ${isCompliant ? 'COMPLIANT' : 'NON-COMPLIANT'}`, 20, 45);
            doc.addImage(canvas.toDataURL('image/png'), 'PNG', 110, 25, 80, 80);
            
            const body = [];
            const subGroups = {};
            cables.forEach(c => {
                const sub = c.sub || 'General';
                if (!subGroups[sub]) subGroups[sub] = {};
                if (!subGroups[sub][c.label]) subGroups[sub][c.label] = { count: 0, dim: c.isFlat ? `${c.w}x${c.h}mm` : `${c.d}mm` };
                subGroups[sub][c.label].count++;
            });
            Object.keys(subGroups).forEach(subName => {
                body.push([{ content: subName, colSpan: 2, styles: { fillColor: [241, 245, 249], fontStyle: 'bold' } }]);
                Object.keys(subGroups[subName]).forEach(label => {
                    body.push([`${subGroups[subName][label].count} x ${label}`, subGroups[subName][label].dim]);
                });
            });

            doc.autoTable({ startY: 105, head: [['Cable Description', 'Dimensions']], body: body, theme: 'striped', headStyles: { fillColor: [37, 99, 235] } });
            doc.save(`Report_${proj.replace(/\s+/g, '_')}.pdf`);
        }

        updateFromDropdown();
    </script>
</body></html>
